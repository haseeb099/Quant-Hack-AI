# Agent configuration — Return Recovery v3 (audit-driven quality entries)

agents:

  trend_surfer:
    weight: 0.52
    timeframes: [H1, H4]
    ema_fast: 9
    ema_medium: 21
    ema_slow: 50
    adx_threshold: 20
    stop_atr_mult: 1.5
    target_atr_mult: 3.8
    base_confidence: 0.58
    max_confidence: 0.95
    pullback_atr_mult: 2.0
    require_mtf_alignment: true
    require_h4_alignment: false
    best_regimes: [trending, volatile]

  breakout_hunter:
    weight: 0.01
    timeframes: [M15, H1]
    donchian_period: 20
    bb_squeeze_percentile: 10
    min_squeeze_bars: 5
    volume_spike_threshold: 1.20
    rsi_filter_long: 78
    rsi_filter_short: 22
    allow_first_pierce: false
    crypto_session_gate: false
    stop_atr_mult: 1.3
    target_atr_mult: 3.2
    base_confidence: 0.64
    max_confidence: 0.90
    best_regimes: [volatile]

  momentum_pulse:
    weight: 0.06
    timeframes: [M15, H1]
    adx_threshold: 20
    volume_threshold: 0.95
    stop_atr_mult: 1.4
    target_atr_mult: 3.0
    base_confidence: 0.55
    max_confidence: 0.86
    allow_continuation: true
    best_regimes: [volatile, trending]

  mean_reversion:
    weight: 0.04
    timeframes: [M15]
    rsi_oversold: 35
    rsi_overbought: 65
    adx_max: 28
    h1_adx_max: 26
    bb_proximity_pct: 12
    stop_atr_mult: 1.0
    min_confidence: 0.58
    max_confidence: 0.85
    require_divergence: false
    best_regimes: [ranging, calm]

  sentiment_agent:
    weight: 0.04
    timeframes: [M15]
    min_score: 0.30
    min_confidence: 0.55
    stop_atr_mult: 1.5
    target_atr_mult: 2.8
    base_confidence: 0.58
    max_confidence: 0.85
    best_regimes: [volatile]

  ml_signal:
    weight: 0.14
    timeframes: [M15]
    model_path: data/models/signal_model.pkl
    stop_atr_mult: 1.4
    target_atr_mult: 3.0
    min_confidence: 0.55
    base_confidence: 0.58
    max_confidence: 0.90
    best_regimes: [volatile, ranging]

  meta_orchestrator:
    anthropic_model: claude-sonnet-4-6
    doubleword_model: openai/gpt-oss-20b
    temperature: 0.10
    min_agent_confidence: 0.58
    cooldown_minutes: 3
    max_cost_per_decision: 0.05
    size_scale_range: [0.95, 1.55]
    regime_mismatch_penalty: 0.68

regime_boosts:
  trending:
    trend_surfer: 1.65
    breakout_hunter: 0.35
    momentum_pulse: 1.08
    mean_reversion: 0.35
    sentiment_agent: 0.85
    ml_signal: 0.78
  ranging:
    trend_surfer: 0.72
    breakout_hunter: 0.45
    momentum_pulse: 0.85
    mean_reversion: 1.20
    sentiment_agent: 0.90
    ml_signal: 1.05
  volatile:
    trend_surfer: 1.25
    breakout_hunter: 0.50
    momentum_pulse: 1.40
    mean_reversion: 0.45
    sentiment_agent: 1.05
    ml_signal: 1.20
  calm:
    trend_surfer: 0.75
    breakout_hunter: 0.45
    momentum_pulse: 0.70
    mean_reversion: 1.15
    sentiment_agent: 0.85
    ml_signal: 0.85
