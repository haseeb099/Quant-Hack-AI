# Market intelligence layer — news, calendar, sentiment, macro
intelligence:
  enabled: true
  refresh_minutes: 5
  llm_budget_per_cycle_usd: 0.10
  cache_dir: data/intelligence

  calendar:
    source: fixture  # fixture | cache | jblanked | rapidapi_forex_factory
    tier_1_window_minutes: 30
    tier_1_post_window_minutes: 8
    tier_2_window_minutes: 15
    tier_2_size_multiplier: 0.5
    tier_2_min_confidence: 0.85
    rapidapi_days_ahead: 1

  news:
    source: fixture  # fixture | newsapi | jblanked | rapidapi_yahoo
    max_headlines_per_symbol: 20
    lookback_hours: 24
    newsapi_base_url: https://newsapi.org/v2/everything
    jblanked_base_url: https://www.jblanked.com/news/api
    jblanked_source: mql5  # mql5 | forex-factory | fxstreet
    jblanked_mode: calendar  # calendar (today's events) | list (event catalog)
    rapidapi_yahoo_region: US
    rapidapi_yahoo_snippet_count: 500

  sentiment:
    min_headlines: 3
    min_headlines_with_macro: 1
    llm_enabled: true
    lexicon_fallback: true

  macro:
    fear_greed_enabled: true
    fear_greed_url: https://api.alternative.me/fng/
    rapidapi_cash_flow_enabled: true

event_impact_tiers:
  tier_1:
    - Non-Farm Payrolls
    - FOMC
    - CPI
    - ECB Rate Decision
    - Federal Funds Rate
  tier_2:
    - GDP
    - PMI
    - Retail Sales
    - Unemployment Rate
    - PPI
  tier_3:
    - Consumer Confidence
    - Trade Balance
    - Housing Starts

symbol_queries:
  BTC/USD: [bitcoin, BTC, crypto, cryptocurrency, ETF, blockchain]
  ETH/USD: [ethereum, ETH, crypto, DeFi, cryptocurrency]
  SOL/USD: [solana, SOL, crypto, altcoin, cryptocurrency]
  XRP/USD: [ripple, XRP, crypto, cryptocurrency, SEC]
  BAR/USD: [crypto, altcoin, cryptocurrency, token]
  XAU/USD: [gold, XAU, safe haven, Fed, bullion, precious metals]
  XAG/USD: [silver, XAG, precious metals, gold, bullion]
  EUR/USD: [euro, ECB, EURUSD, dollar, Fed, forex, EUR]
  GBP/USD: [pound, sterling, BOE, GBPUSD, dollar, Fed, forex, GBP]
  USD/JPY: [yen, BOJ, USDJPY, dollar, Fed, forex, JPY]
  AUD/USD: [australian dollar, RBA, AUDUSD, dollar, Fed, forex, AUD]
  USD/CAD: [canadian dollar, BOC, USDCAD, dollar, Fed, forex, CAD, oil]
  USD/CHF: [swiss franc, SNB, USDCHF, dollar, Fed, forex, CHF]
  EUR/GBP: [euro, pound, EURGBP, forex, ECB, BOE]
  EUR/CHF: [euro, franc, EURCHF, forex, ECB, SNB]

currency_symbols:
  USD: [BTC/USD, ETH/USD, SOL/USD, XRP/USD, BAR/USD, XAU/USD, XAG/USD, USD/JPY, AUD/USD, USD/CAD, USD/CHF]
  EUR: [EUR/USD, EUR/GBP, EUR/CHF]
  GBP: [GBP/USD, EUR/GBP]
  JPY: [USD/JPY]
  AUD: [AUD/USD]
  CAD: [USD/CAD]
  CHF: [USD/CHF, EUR/CHF]
